<script>
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const fileContainer = document.getElementById('fileContainer');
const strengthSlider = document.getElementById('strengthSlider');
const intensityLabel = document.getElementById('intensityLabel');
const flattenToggle = document.getElementById('flattenToggle');
const compressBtn = document.getElementById('compressBtn');
const statsPanel = document.getElementById('statsPanel');
const origSizeSpan = document.getElementById('origSize');
const compSizeSpan = document.getElementById('compSize');
const savedPercentSpan = document.getElementById('savedPercent');
const progressArea = document.getElementById('progressArea');
const progressFill = document.getElementById('progressFill');
const progressMsg = document.getElementById('progressMsg');

let currentPdfFile = null;

function formatBytes(bytes) {
  if (!bytes) return '0 B';

  const sizes = ['B', 'KB', 'MB', 'GB'];
  const i = Math.floor(Math.log(bytes) / Math.log(1024));

  return (
    parseFloat((bytes / Math.pow(1024, i)).toFixed(2)) +
    ' ' +
    sizes[i]
  );
}

function updateSliderLabel(value) {
  let label = 'Balanced';

  if (value < 25) label = 'Maximum Compression';
  else if (value < 50) label = 'High Compression';
  else if (value < 75) label = 'Balanced';
  else label = 'High Quality';

  intensityLabel.innerText = `${label} · ${value}%`;
}

strengthSlider.addEventListener('input', e => {
  updateSliderLabel(e.target.value);
});

updateSliderLabel(strengthSlider.value);

function renderFileUI() {
  if (!currentPdfFile) {
    fileContainer.innerHTML = '';
    compressBtn.disabled = true;
    return;
  }

  fileContainer.innerHTML = `
    <div class="file-item">
      <div class="file-info">
        <i class="fas fa-file-pdf"></i>
        <span>
          ${currentPdfFile.name}
          (${formatBytes(currentPdfFile.size)})
        </span>
      </div>

      <button class="delete-file" id="removeFile">
        <i class="fas fa-trash-alt"></i>
      </button>
    </div>
  `;

  document
    .getElementById('removeFile')
    ?.addEventListener('click', () => {
      currentPdfFile = null;
      fileInput.value = '';

      renderFileUI();

      statsPanel.style.display = 'none';
      progressArea.style.display = 'none';
    });

  compressBtn.disabled = false;
}

function handleFile(file) {
  if (!file) return;

  if (file.type !== 'application/pdf') {
    alert('Only PDF files supported');
    return;
  }

  currentPdfFile = file;

  renderFileUI();

  statsPanel.style.display = 'none';
  progressArea.style.display = 'none';
}

dropZone.addEventListener('dragover', e => {
  e.preventDefault();
  dropZone.classList.add('active');
});

dropZone.addEventListener('dragleave', () => {
  dropZone.classList.remove('active');
});

dropZone.addEventListener('drop', e => {
  e.preventDefault();

  dropZone.classList.remove('active');

  if (e.dataTransfer.files[0]) {
    handleFile(e.dataTransfer.files[0]);
  }
});

dropZone.addEventListener('click', () => {
  fileInput.click();
});

fileInput.addEventListener('change', e => {
  if (e.target.files.length) {
    handleFile(e.target.files[0]);
  }
});

async function blobToImage(blob) {
  return await createImageBitmap(blob);
}

async function compressImage(rawBytes, quality) {
  try {
    const blob = new Blob([rawBytes]);

    const bitmap = await blobToImage(blob);

    const canvas = document.createElement('canvas');

    canvas.width = bitmap.width;
    canvas.height = bitmap.height;

    const ctx = canvas.getContext('2d');

    ctx.drawImage(bitmap, 0, 0);

    const compressedBlob = await new Promise(resolve => {
      canvas.toBlob(
        resolve,
        'image/jpeg',
        quality
      );
    });

    if (!compressedBlob) return null;

    return await compressedBlob.arrayBuffer();

  } catch (err) {
    console.warn('Image compression skipped', err);
    return null;
  }
}

async function compressPDF(pdfBuffer, strength, flatten) {

  const quality =
    Math.max(
      0.25,
      Math.min(
        0.95,
        strength / 100
      )
    );

  const pdfDoc = await PDFLib.PDFDocument.load(pdfBuffer, {
    ignoreEncryption: true,
    updateMetadata: false
  });

  const pages = pdfDoc.getPages();

  const processedRefs = new Set();

  for (const page of pages) {

    const resources =
      page.node.Resources();

    if (!resources) continue;

    const xObject =
      resources.lookup(
        PDFLib.PDFName.of('XObject')
      );

    if (!xObject) continue;

    const keys = xObject.keys();

    for (const key of keys) {

      try {

        const object =
          xObject.lookup(key);

        if (!object) continue;

        const subtype =
          object.lookup(
            PDFLib.PDFName.of('Subtype')
          );

        if (
          !subtype ||
          subtype.toString() !== '/Image'
        ) {
          continue;
        }

        if (
          object.ref &&
          processedRefs.has(object.ref.objectNumber)
        ) {
          continue;
        }

        if (object.ref) {
          processedRefs.add(
            object.ref.objectNumber
          );
        }

        const rawStream =
          object.contents;

        if (!rawStream) continue;

        const compressed =
          await compressImage(
            rawStream,
            quality
          );

        if (!compressed) continue;

        const jpgImage =
          await pdfDoc.embedJpg(compressed);

        xObject.set(key, jpgImage.ref);

      } catch (err) {
        console.warn(
          'Single image failed',
          err
        );
      }
    }
  }

  if (flatten) {

    try {

      pdfDoc.setTitle('');
      pdfDoc.setAuthor('');
      pdfDoc.setSubject('');
      pdfDoc.setProducer('');
      pdfDoc.setCreator('');

      for (const page of pages) {

        const annots =
          page.node.lookup(
            PDFLib.PDFName.of('Annots')
          );

        if (annots) {
          page.node.delete(
            PDFLib.PDFName.of('Annots')
          );
        }
      }

    } catch (err) {
      console.warn('Flatten skipped');
    }
  }

  return await pdfDoc.save({
    useObjectStreams: true,
    addDefaultPage: false,
    objectsPerTick: 20
  });
}

compressBtn.addEventListener(
  'click',
  async () => {

    if (!currentPdfFile) return;

    compressBtn.disabled = true;

    compressBtn.innerHTML =
      '<i class="fas fa-spinner fa-spin"></i> Compressing...';

    progressArea.style.display = 'block';

    progressFill.style.width = '0%';

    progressMsg.innerText =
      'Loading PDF...';

    statsPanel.style.display = 'none';

    try {

      const originalSize =
        currentPdfFile.size;

      const strength =
        parseInt(
          strengthSlider.value
        );

      const flatten =
        flattenToggle.checked;

      const buffer =
        await currentPdfFile.arrayBuffer();

      progressFill.style.width = '20%';

      progressMsg.innerText =
        'Optimizing images...';

      const compressedBytes =
        await compressPDF(
          buffer,
          strength,
          flatten
        );

      progressFill.style.width = '90%';

      const compressedBlob =
        new Blob(
          [compressedBytes],
          { type: 'application/pdf' }
        );

      const compressedSize =
        compressedBlob.size;

      const saved =
        originalSize - compressedSize;

      const percent =
        (
          (saved / originalSize) *
          100
        ).toFixed(1);

      origSizeSpan.innerText =
        formatBytes(originalSize);

      compSizeSpan.innerText =
        formatBytes(compressedSize);

      savedPercentSpan.innerText =
        `${percent}%`;

      statsPanel.style.display = 'flex';

      const url =
        URL.createObjectURL(
          compressedBlob
        );

      const a =
        document.createElement('a');

      a.href = url;

      a.download =
        currentPdfFile.name.replace(
          /\.pdf$/i,
          ''
        ) + '_compressed.pdf';

      document.body.appendChild(a);

      a.click();

      a.remove();

      setTimeout(() => {
        URL.revokeObjectURL(url);
      }, 5000);

      progressFill.style.width = '100%';

      progressMsg.innerText =
        'Compression completed';

    } catch (err) {

      console.error(err);

      alert(
        'Compression failed: ' +
        err.message
      );

      progressArea.style.display =
        'none';

    } finally {

      compressBtn.disabled = false;

      compressBtn.innerHTML =
        '<i class="fas fa-cogs"></i> Compress images';

      setTimeout(() => {
        progressArea.style.display =
          'none';
      }, 2500);
    }
  }
);

renderFileUI();

document
  .getElementById('backButton')
  ?.addEventListener('click', () => {

    if (window.history.length > 1) {
      window.history.back();
    } else {
      window.location.href = '/';
    }
  });
</script>
