<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF Compressor</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.5.136/pdf.min.mjs" type="module"></script>
  <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f4f6f9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 700px;
      background: white;
      padding: 35px;
      border-radius: 20px;
      box-shadow: 0 10px 35px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
      margin-bottom: 25px;
      color: #222;
    }

    .upload-box {
      border: 2px dashed #999;
      border-radius: 16px;
      padding: 40px;
      text-align: center;
      cursor: pointer;
      transition: 0.3s;
    }

    .upload-box:hover {
      border-color: #007bff;
      background: #f8fbff;
    }

    input[type="file"] {
      display: none;
    }

    .file-name {
      margin-top: 15px;
      font-size: 15px;
      color: #444;
    }

    .controls {
      margin-top: 25px;
    }

    label {
      display: block;
      margin-bottom: 10px;
      font-weight: bold;
    }

    select, button {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #ccc;
      margin-bottom: 20px;
      font-size: 16px;
    }

    button {
      background: #007bff;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }

    button:hover {
      background: #0056cc;
    }

    button:disabled {
      background: gray;
      cursor: not-allowed;
    }

    .progress {
      width: 100%;
      height: 20px;
      background: #ddd;
      border-radius: 10px;
      overflow: hidden;
      display: none;
      margin-bottom: 20px;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: #28a745;
      transition: width 0.3s;
    }

    .result {
      text-align: center;
      margin-top: 20px;
    }

    .download-btn {
      display: inline-block;
      padding: 14px 22px;
      background: #28a745;
      color: white;
      text-decoration: none;
      border-radius: 12px;
      margin-top: 15px;
      font-weight: bold;
    }

    .stats {
      margin-top: 15px;
      line-height: 1.8;
      color: #333;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>PDF Compressor</h1>

  <label class="upload-box">
    <input type="file" id="pdfFile" accept="application/pdf">
    <div>
      <h2>Upload PDF</h2>
      <p>Click here to select file</p>
      <div class="file-name" id="fileName"></div>
    </div>
  </label>

  <div class="controls">
    <label>Compression Level</label>
    <select id="quality">
      <option value="0.9">Low Compression (Best Quality)</option>
      <option value="0.7" selected>Medium Compression</option>
      <option value="0.5">High Compression</option>
      <option value="0.3">Extreme Compression</option>
    </select>

    <button id="compressBtn">Compress PDF</button>

    <div class="progress" id="progressContainer">
      <div class="progress-bar" id="progressBar"></div>
    </div>
  </div>

  <div class="result" id="result"></div>
</div>

<script>
  const fileInput = document.getElementById('pdfFile');
  const fileName = document.getElementById('fileName');
  const compressBtn = document.getElementById('compressBtn');
  const result = document.getElementById('result');
  const progressBar = document.getElementById('progressBar');
  const progressContainer = document.getElementById('progressContainer');

  let selectedFile = null;

  fileInput.addEventListener('change', (e) => {
    selectedFile = e.target.files[0];

    if (selectedFile) {
      fileName.innerHTML = `Selected: <b>${selectedFile.name}</b>`;
    }
  });

  function updateProgress(value) {
    progressBar.style.width = value + '%';
  }

  async function compressPDF() {
    if (!selectedFile) {
      alert('Please select a PDF file');
      return;
    }

    compressBtn.disabled = true;
    progressContainer.style.display = 'block';
    result.innerHTML = '';

    try {
      updateProgress(5);

      const quality = parseFloat(document.getElementById('quality').value);

      const arrayBuffer = await selectedFile.arrayBuffer();

      updateProgress(15);

      const pdfjsLib = window['pdfjs-dist/build/pdf'];

      pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.5.136/pdf.worker.min.mjs';

      const loadingTask = pdfjsLib.getDocument({ data: arrayBuffer });
      const pdf = await loadingTask.promise;

      updateProgress(25);

      const { PDFDocument } = PDFLib;
      const newPdf = await PDFDocument.create();

      for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
        const page = await pdf.getPage(pageNum);

        const viewport = page.getViewport({ scale: 1.5 });

        const canvas = document.createElement('canvas');
        const context = canvas.getContext('2d');

        canvas.width = viewport.width;
        canvas.height = viewport.height;

        await page.render({
          canvasContext: context,
          viewport: viewport,
        }).promise;

        // REAL COMPRESSION
        const imageData = canvas.toDataURL('image/jpeg', quality);

        const jpgImage = await newPdf.embedJpg(imageData);

        const pdfPage = newPdf.addPage([viewport.width, viewport.height]);

        pdfPage.drawImage(jpgImage, {
          x: 0,
          y: 0,
          width: viewport.width,
          height: viewport.height,
        });

        const progress = 25 + ((pageNum / pdf.numPages) * 60);
        updateProgress(progress);
      }

      const compressedBytes = await newPdf.save({
        useObjectStreams: true,
      });

      updateProgress(95);

      const originalSize = selectedFile.size;
      const compressedSize = compressedBytes.length;

      const reduction = ((originalSize - compressedSize) / originalSize * 100).toFixed(2);

      const blob = new Blob([compressedBytes], {
        type: 'application/pdf'
      });

      const url = URL.createObjectURL(blob);

      updateProgress(100);

      result.innerHTML = `
        <div class="stats">
          <div><b>Original Size:</b> ${(originalSize / 1024 / 1024).toFixed(2)} MB</div>
          <div><b>Compressed Size:</b> ${(compressedSize / 1024 / 1024).toFixed(2)} MB</div>
          <div><b>Reduction:</b> ${reduction > 0 ? reduction : 0}%</div>
        </div>

        <a class="download-btn" href="${url}" download="compressed.pdf">
          Download Compressed PDF
        </a>
      `;

    } catch (error) {
      console.error(error);
      alert('Compression failed. PDF may be encrypted or unsupported.');
    }

    compressBtn.disabled = false;
  }

  compressBtn.addEventListener('click', compressPDF);
</script>

</body>
</html>
